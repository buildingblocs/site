excerpt: Get ready for BuildingBloCS June Jam! Level up your game development skills, learn exciting new concepts, and connect with like-minded individuals.
openExcerpt: Level up your game development skills, sign up now!
closedExcerpt: The December Conference teaches you how to create your very own website
overExcerpt: The December Conference teaches you how to create your very own website
desc: >-
    BuildingBloCS is back with our inaugural Game Jam! From Pygame, Unity, C#, to topics like 
    Electronic Music Composition, Blender, Fluid Simulation and even Data Science, there's 
    something for everyone to learn about Game Dev, regardless of whether you’re a professional 
    or a beginner. The best part? Enjoy lunch for all five days as you attend the workshops 
    and sit in for our ceremonies. We look forward to welcoming you to start your journey to 
    develop games; sign up now before registrations close!
    <br><br>
    The schedule is subject to change, however the start and end times will remain the same. Updates
    to the schedule will be reflected on this page. Transportation for shuttle bus is only provided on
    Day 1, 2, and 5
    <br><br>
    <b>30 May: Schedule has been updated, with Day 1 starting at 9.30 while Day 2-5 start at 10</b>
faq:
    - q: What are the transportation methods available?
      a: We are offering free shuttle bus from Tanah Merah and Serangoon MRT bus stops. Otherwise, you can come by car, or take public Transportation
    - q: Must I go for all the workshops?
      a: For this year's June Jam, we are introducing two types of workshops, core workshops and side quests. Core workshops are essential for you to get started with game development itself, helping you get the most out of the event and to do well for the Game Jam. Side quests are optional, but builds on the foundation of core workshops.  A participation certificate will only be given to those who attend <b>all</b> of the core workshops.
    - q: Who can come for the event?
      a: This event is for students, ranging from secondary to university-level students. We aim to target beginner developers, so don't worry if you've got no experience, just come in with an open mind and a passion to learn!
    - q: Why should I sign up? Is it free?
      a: It's a free, fun and easy way to learn new skills about many new topics related to computing! What more could you ask for?
    - q: What if something pops up and I can't make it?
      a: Please open a ticket in the BuildingBloCS server so we can update your registration status.
    - q: What is the Game Jam? Is it compulsory?
      a: The Game Jam is a competition where you'll have to work in teams of 4 to create a game based on a theme provided. It's a great way to practice your skills, however, it is not compulsory, to encourage everyone to learn and attend.
    - q: What are the prizes? When will I get them?
      a: We can't divulge any information about the prizes, but they will be shipped out after the finals, on Monday, 15th June!
    - q: How will the Game Jam groups be allocated? Can I choose my teammates?
      a: For this Game Jam, we will be allocating the groups for you. However, if you (mutually) indicate someone you'll like to work with, we'll take that into consideration. Any other empty slots will be filled randomly, taking into account your age.
    - q: Am I allowed to use AI during the Game Jam?
      a: While <b>we do permit the use of AI during the Game Jam</b>, we hope that you will not overuse it, as being able to code on your own is extremely beneficial to your own learning.
    - q: I still have questions! Who can I contact?
      a: The fastest way to reach us is to open a ticket on our Discord server, which you can join at <a href="https://go.buildingblocs.sg/discord">go.buildingblocs.sg/discord</a> <br> However, if you are unable to use Discord, you may also shoot us an email at <a href="mailto:hello@buildingblocs.sg">hello@buildingblocs.sg</a>
